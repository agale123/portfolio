<!doctype html>
<html>
  <head>
    <title>Good Birds of Washington</title>
    <link rel="icon" type="image/x-icon" href="bird_favicon.ico" />
    <style>
      html {
        background-color: #e5e3dc;
      }

      body {
        margin: 0;
      }

      #center {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      #border {
        padding: 32px;
        padding-bottom: 28px;
        border-radius: 32px;
        background-color: white;
      }

      #container {
        width: 800px;
        height: 552px;
        position: relative;
      }

      iframe {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        transition: opacity 0.5s ease-in-out;
        border: none;
      }

      .visible {
        opacity: 1;
        z-index: 2;
      }

      .hidden {
        opacity: 0;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div id="center">
      <div id="border">
        <div id="container">
          <iframe
            id="frame1"
            class="hidden"
            src=""
            height="552px"
            width="800px"
            frameborder="0"
            allowfullscreen
          ></iframe>
          <iframe
            id="frame2"
            class="hidden"
            ssrc=""
            height="552px"
            width="800px"
            frameborder="0"
            allowfullscreen
          ></iframe>
        </div>
      </div>
    </div>
    <script src="scripts/birds.js"></script>
  </body>
</html>
